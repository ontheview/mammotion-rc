; Standalone HaLow hardware-test project.  Builds just Heltec's HalowScan
; example with the region set to AU.  No BLE, no softAP, no TCP proxy — pure
; HaLow chip exercise so we can sanity-check the MM6108 RX path and compare
; the scan-reported RSSI to what our main firmware's mmwlan_get_rssi() returns
; (suspected mis-scaled by ~70 dB — see memory: halow-antenna-chain-loss).
;
; Build / flash:
;   pio run -e hc33-halowscan -t upload
;   pio device monitor -e hc33-halowscan
;
; The platform / framework / linker config below mirrors firmware/platformio.ini
; env:hc33 — pioarduino 51.x, Heltec ESP_HaLow framework, HT-HC33 board variant.
; Setup prerequisite: ESP_HaLow cloned + tools/get.py run (see firmware ini).

[env:hc33-halowscan]
platform = https://github.com/pioarduino/platform-espressif32.git#51.03.07
board = esp32-s3-devkitc-1
framework = arduino

board_build.flash_mode = dio
board_build.boot = qio
board_build.arduino.memory_type = qio_qspi
board_build.flash_size = 8MB
board_build.variant = HT-HC33
board_build.partitions = ../ESP_HaLow/variants/HT-HC33/partitions.csv

platform_packages =
  framework-arduinoespressif32 @ file://C:/path/to/ble-proxy/ESP_HaLow
  framework-arduinoespressif32-libs @ file://C:/path/to/ble-proxy/ESP_HaLow/tools/esp32-arduino-libs

build_unflags = -std=gnu++11 -std=gnu++14 -std=gnu++17 -std=gnu++2a -std=gnu++2b

build_flags =
  -std=gnu++2a
  -fpermissive
  -LC:/path/to/ble-proxy/ESP_HaLow/libraries/wifi-halow/src
  -LC:/path/to/ble-proxy/ESP_HaLow/libraries/wifi-halow/src/esp32s3
  -LC:/path/to/ble-proxy/ESP_HaLow/tools/bcf
  -Wl,--start-group
  -lheltec_halow
  -lmm6108
  -lmorse
  -lmmipal
  -lmmpktmem
  -lmmutils
  ; BCF for HT-HC33 per Heltec boards.txt: bcf_mf08551 (Morse Micro reference
  ; design).  Previously linked -lbcf_HC01_V2_H by mistake (HC01 board's BCF).
  -lbcf_mf08551
  -Wl,--end-group

monitor_speed = 115200
monitor_filters = esp32_exception_decoder, colorize
upload_speed = 921600
upload_port = COM3
