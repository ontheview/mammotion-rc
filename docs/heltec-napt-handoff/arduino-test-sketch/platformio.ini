; PlatformIO config for the NAPT test sketch.
;
; Mirrors the platformio.ini we use for our production HC33 firmware (just
; trimmed to NAPT-test essentials and renamed env).  Build with:
;
;   pio run -e napt-test -t upload
;
; Prereqs (one-time):
;   1. git clone https://github.com/HelTecAutomation/ESP_HaLow.git ../ESP_HaLow
;   2. cd ../ESP_HaLow/tools && python get.py
;
; Make sure ../ESP_HaLow/libraries/wifi-halow/src/esp32s3/ contains your
; NEW liblwip.a and libesp_netif.a (the ones rebuilt with NAPT support).

[env:napt-test]
platform = https://github.com/pioarduino/platform-espressif32.git#51.03.07
board = esp32-s3-devkitc-1
framework = arduino

board_build.variant = HT-HC33
board_build.flash_mode = dio
board_build.boot = qio
board_build.arduino.memory_type = qio_qspi
board_build.flash_size = 8MB
board_build.partitions = ../ESP_HaLow/variants/HT-HC33/partitions.csv

platform_packages =
  framework-arduinoespressif32 @ file://../ESP_HaLow
  framework-arduinoespressif32-libs @ file://../ESP_HaLow/tools/esp32-arduino-libs

build_unflags = -std=gnu++11 -std=gnu++14 -std=gnu++17 -std=gnu++2a -std=gnu++2b

build_flags =
  -std=gnu++2a
  -fpermissive
  ; Match the layout flags the rebuilt liblwip.a was built with so our compile
  ; sees the same struct netif layout (see ../README.md section "lwipopts.h edits").
  -DLWIP_NETIF_LINK_CALLBACK=1
  -DCONFIG_LWIP_NETIF_STATUS_CALLBACK=1
  -DCONFIG_LWIP_IPV6_DHCP6=1
  -L../ESP_HaLow/libraries/wifi-halow/src
  -L../ESP_HaLow/libraries/wifi-halow/src/esp32s3
  -L../ESP_HaLow/tools/bcf
  -Wl,--start-group
  -lmm6108
  -lmorse
  -lbcf_mf08551
  -Wl,--end-group

monitor_speed = 115200
monitor_filters = esp32_exception_decoder, colorize
upload_speed = 921600
