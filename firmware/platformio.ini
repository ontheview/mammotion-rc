[env:hc33-base]
; Shared base for both standard-WiFi and HaLow builds.  Don't use directly —
; pick env:hc33 (HaLow) or env:hc33-standard-wifi.
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; HC33 board settings: DIO app header, QIO bootloader ELF, qio_qspi SDK.
; qio_qspi has CONFIG_SPIRAM=1.  If BOARD_HAS_PSRAM were defined, Arduino's
; initArduino() would call psramInit() → esp_spiram_init(), which probes the
; MSPI bus and corrupts it (HC33 has no accessible PSRAM on GPIO26/30).
; Leaving BOARD_HAS_PSRAM undefined causes esp32-hal-psram.h to #undef both
; CONFIG_SPIRAM and CONFIG_SPIRAM_SUPPORT, so psramInit() compiles to a
; trivial no-op stub — esp_spiram_init() is never called from the Arduino layer.
board_build.flash_mode = dio
board_build.boot = qio
board_build.arduino.memory_type = qio_qspi
board_build.flash_size = 8MB
; Single in-repo partition table for both envs (HaLow + standard-wifi).  Based
; on the board-correct Heltec HT-HC33 layout plus a 4 KB `config` partition at
; 0x7EF000 that config_load.cpp reads at boot.  The old default_8MB.csv was a
; wrong guess from before we found the Heltec table.
board_build.partitions = partitions/hc33.csv

; Register the `flashcfg` custom target (`pio run -t flashcfg`) for writing
; config.local.ini into the config partition.  No effect on regular builds /
; uploads — see scripts/flashcfg.py.
extra_scripts = scripts/flashcfg.py

; C++ standard left at whatever the framework defaults to.  The HaLow env
; overrides this (it needs gnu++2a for mmwlan_regdb.h's designated initializers);
; standard-wifi must stay on the stock gnu++17 or NimBLE-Arduino crashes at
; BT controller bring-up — the C++20 flag shifts libstdc++ ABI on GCC 8.4 in
; a way that misaligns NimBLE's host-stack data structures.

build_flags =
  -DCONFIG_BT_NIMBLE_ENABLED=1

lib_deps =
  h2zero/NimBLE-Arduino @ ^1.4.3

monitor_speed = 115200
monitor_filters = esp32_exception_decoder, colorize
upload_speed = 921600
upload_port = COM3

[env:hc33]
; Production target: HaLow uplink (HT-HC01 module), internal BLE on the S3.
;
; Uses Heltec's arduino-esp32 fork via platform_packages.  The wifi-halow
; library and its dependencies (libesp_netif.a, liblwip.a, IDF headers) all
; ship inside that framework — no lib_extra_dirs needed.
;
; Setup (one-time on each dev machine):
;   1. git clone https://github.com/HelTecAutomation/ESP_HaLow.git ../ESP_HaLow
;   2. cd ../ESP_HaLow/tools && python get.py   (downloads ~600 MB IDF binaries)
;
; Reads WIFI_SSID_HALOW / WIFI_PASS_HALOW / WIFI_REGION_HALOW from config.h.
extends = env:hc33-base

; Bump the platform itself so we get GCC 13 (matches arduino-esp32 v3 +
; Heltec's framework).  PIO's official espressif32 7.0.1 ships GCC 8.4 which
; can't compile v3's C99-style designated initializers in C++ mode.
;
; pioarduino is a community fork of platform-espressif32 that tracks current
; arduino-esp32 releases (with the newer xtensa-esp-elf toolchain).  Used
; here only for the HaLow env — env:hc33-standard-wifi stays on the stock
; platform (PIO 7.0.1 / GCC 8.4) which works fine for that case.
; Pin to pioarduino 51.x (= ESP-IDF 5.1 era) to match the toolchain ABI
; that Heltec's framework-libs @ 5.1.0+sha.3662303f31 was built against.
; Tags without 'v' prefix on this remote.
platform = https://github.com/pioarduino/platform-espressif32.git#51.03.07

; Heltec's framework ships a board variant matching our hardware (HT-HC33).
; The stock esp32-s3-devkitc-1 variant doesn't exist inside Heltec's tree,
; so we point board_build.variant at theirs.
board_build.variant = HT-HC33

; Partition table now lives at partitions/hc33.csv in the base env (it's the
; correct Heltec HT-HC33 layout, in-repo so re-cloning ESP_HaLow can't clobber
; it).  Includes the 4 KB `config` partition that config_load.cpp reads.

; Absolute file:// URLs — symlink:// can fail silently on Windows without
; developer mode.  Edit the paths if you cloned ble-proxy elsewhere.
;
; arduino-esp32 v3 split the framework into two packages: the sources and
; the precompiled IDF blobs (esp32-arduino-libs).  Heltec's framework expects
; both to be on the PIO package path.  tools/get.py downloads the libs into
; ESP_HaLow/tools/esp32-arduino-libs/.
platform_packages =
  framework-arduinoespressif32 @ file://C:/path/to/ble-proxy/ESP_HaLow
  framework-arduinoespressif32-libs @ file://C:/path/to/ble-proxy/ESP_HaLow/tools/esp32-arduino-libs

; Strip every -std= variant we know about so the explicit -std=gnu++2a below
; is what GCC sees.  Heltec's framework adds -std=gnu++2b (C++23) which the
; bundled GCC 12 toolchain accepts but the older one we used didn't — keep
; the unflags broad to survive toolchain swaps.
build_unflags = -std=gnu++11 -std=gnu++14 -std=gnu++17 -std=gnu++2a -std=gnu++2b

; Path C build (replaced Heltec's closed libheltec_halow.a wrapper with
; mm-iot-esp32 2.8.2 release morselib + manually-merged Heltec Arduino
; wrappers).  The wifi-halow library tree we link against now ships:
;   - mmwlan/mmipal/mmnetif compiled from source (was libmmipal.a /
;     libmmpktmem.a / libmmutils.a / libheltec_halow.a)
;   - libmorse.a (release, no -dbg suffix — fixes the host-side TX wedge)
;   - libmm6108.a wrapping mm6108_1_15_3.mbin (was 1.14.1)
;   - libbcf_mf08551.a (HC33-specific RF calibration; unchanged)
;   - liblwip.a / libesp_netif.a rebuilt from esp-idf-build/ tree (NAPT-patched,
;     LWIP_NETIF_LINK_CALLBACK=1 to match the struct layout our compile sees)
;
; Build flags below override the CONFIG_LWIP_* macros that Heltec's framework
; sdkconfig.h leaves undefined, so OUR compile of mmnetif.c / mmipal_lwip.c
; sees the same `struct netif` layout that the linked liblwip.a was built
; against.  See memory: path-c-lwip-config-defines.
build_flags =
  ${env:hc33-base.build_flags}
  -std=gnu++2a
  ; GCC + -std=gnu++2a still rejects the C99-style designated initializers
  ; in HaLow's mmwlan_regdb.h ("C99 designator outside aggregate initializer").
  ; -fpermissive downgrades that to a warning so the library compiles.
  -fpermissive
  ; Path C struct-layout defines (must match the values used when liblwip.a
  ; was built — see esp-idf-build/lwip-rebuild/sdkconfig.defaults).
  -DLWIP_NETIF_LINK_CALLBACK=1
  -DCONFIG_LWIP_NETIF_STATUS_CALLBACK=1
  -DCONFIG_LWIP_IPV6_DHCP6=1
  -LC:/path/to/ble-proxy/ESP_HaLow/libraries/wifi-halow/src
  -LC:/path/to/ble-proxy/ESP_HaLow/libraries/wifi-halow/src/esp32s3
  -LC:/path/to/ble-proxy/ESP_HaLow/tools/bcf
  -Wl,--start-group
  -lmm6108
  -lmorse
  ; BCF (Board Config File): per-board RF calibration / LNA bias / TX power
  ; tables for the MM6108.  Must match the actual hardware variant or RX is
  ; deaf and TX is mis-calibrated.  Heltec's boards.txt explicitly maps
  ; HT-HC33 to bcf_mf08551 (the Morse Micro reference design BCF).  We were
  ; previously linking -lbcf_HC01_V2_H (HC01 V2 high-power) — wrong board.
  -lbcf_mf08551
  -Wl,--end-group

; Path C: skip auto-discovery of any wifi-halow-* directories that PIO
; would otherwise try to compile as a separate library (e.g., a renamed
; backup of the old Heltec library).  The canonical Path C tree at
; ESP_HaLow/libraries/wifi-halow/ is what's linked above.
lib_ignore =
  wifi-halow.heltec-orig
  wifi-halow-orig

[env:hc33-standard-wifi]
; Dev target: built-in 2.4 GHz WiFi STA, internal BLE on the S3.  Reads
; WIFI_SSID_STANDARD / WIFI_PASS_STANDARD from include/config.h.
;
; Pin to stock PIO espressif32 6.10.0 (last v2 release; arduino-esp32 v2.0.17,
; GCC 8.4, IDF 4.4.x).  Without the pin, PIO resolves "espressif32" to whatever
; was last installed under that name — and once env:hc33 installs pioarduino,
; it CLAIMS the espressif32 platform name globally, so this env silently builds
; against arduino-esp32 v3 + IDF 5.x.  NimBLE-Arduino 1.4.3 then crashes at BT
; controller bring-up (LoadProhibited inside esp_bt_controller_init) because
; it was written for IDF 4.x and the v5 BT controller has a different ABI.
;
; If you want to bump everything to v3, change NimBLE-Arduino to ^2.0.0 in
; lib_deps and update ble_central.cpp's scan callback (see option B notes).
extends = env:hc33-base
platform = espressif32@6.10.0
build_flags =
  ${env:hc33-base.build_flags}
  -DUSE_STANDARD_WIFI=1
